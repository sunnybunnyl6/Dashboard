<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <!-- Load CSS First -->
    <link href="https://jsdelivr.net" rel="stylesheet"/>
    <style>
        body { background: #f0f2f5; margin: 0; font-family: sans-serif; }
        #container { height: 100vh; padding: 20px; overflow-y: auto; }
        /* MUST have a class of .grid-stack for the engine to find it */
        .grid-stack { background: rgba(0,0,0,0.03); min-height: 500px; border-radius: 10px; }
        
        .grid-stack-item-content { 
            background: white; border-radius: 10px; padding: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; 
        }

        #dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
                background: white; padding: 10px 20px; border-radius: 50px; 
                display: flex; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; }
        .dock-btn { cursor: pointer; border: none; background: #5c67f2; color: white; 
                    padding: 10px 20px; border-radius: 25px; font-weight: bold; }
        .delete-btn { position: absolute; top: 5px; right: 5px; cursor: pointer; color: #ccc; border: none; background: none; }
    </style>
</head>
<body>

<div id="container">
    <div class="grid-stack"></div>
</div>

<div id="dock">
    <button class="dock-btn" onclick="addNewWidget('text')">+ Note</button>
    <button class="dock-btn" onclick="addNewWidget('embed')">+ Embed</button>
    <button class="dock-btn" onclick="saveData()">💾 Save</button>
</div>

<!-- Load Library -->
<script src="https://jsdelivr.net"></script>

<script>
    // Initialize carefully
    let grid;
    
    document.addEventListener('DOMContentLoaded', () => {
        grid = GridStack.init({
            float: true,
            cellHeight: 80,
            margin: 10
        });
        console.log("Grid Initialized:", grid);
    });

    function addNewWidget(type) {
        if (!grid) {
            console.error("Grid not ready!");
            return;
        }

        let innerContent = "";
        if (type === 'text') {
            innerContent = `<textarea style="width:100%; height:100%; border:none; outline:none; resize:none;">New Note...</textarea>`;
        } else {
            const url = prompt("Link:");
            innerContent = `<iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe>`;
        }

        // IMPORTANT: The widget MUST have this exact wrapper structure
        const widgetHtml = `
            <div>
                <div class="grid-stack-item-content">
                    <button class="delete-btn" onclick="grid.removeWidget(this.parentElement.parentElement)">✕</button>
                    ${innerContent}
                </div>
            </div>`;
        
        // Add to grid
        grid.addWidget(widgetHtml, {w: 3, h: 2});
        console.log("Widget Added!");
    }
</script>
</body>
</html>
