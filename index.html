<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <!-- Gridstack CSS -->
    <link href="https://jsdelivr.net" rel="stylesheet"/>
    <style>
        body { background-color: #f0f2f5; margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; }
        .grid-stack-item-content {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        h3 { margin-top: 0; color: #333; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="grid-stack">
        <!-- Tile 1: School Schedule -->
        <div class="grid-stack-item" gs-w="3" gs-h="4">
            <div class="grid-stack-item-content">
                <h3>Mon, Tue, Thurs</h3>
                <p>8:20-9:03 1st Hour</p>
                <p>9:06-9:53 2nd Hour</p>
            </div>
        </div>

        <!-- Tile 2: Spotify Embed -->
        <div class="grid-stack-item" gs-w="4" gs-h="3">
            <div class="grid-stack-item-content">
                <h3>Music</h3>
                <iframe style="border-radius:12px" src="https://spotify.com" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <!-- Gridstack JS -->
    <script src="https://jsdelivr.net"></script>
    <script>
        // This initializes the grid so you can drag and resize things
        var grid = GridStack.init({
            cellHeight: 80,
            margin: 10
        });
    </script>
</body>
</html>
