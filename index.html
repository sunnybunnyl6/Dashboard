<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Dashboard</title>
    <link href="https://jsdelivr.net" rel="stylesheet"/>
    <style>
        :root {
            --bg: #fdfdfd; /* Subtle off-white */
            --tile-bg: #ffffff;
            --accent: #6c5ce7;
            --shadow: 0 4px 12px rgba(0,0,0,0.04);
            --border: #edf2f7;
        }

        body { 
            background-color: var(--bg); 
            margin: 0; 
            font-family: 'Inter', -apple-system, sans-serif; 
            overflow: hidden; 
        }
        
        #container { 
            height: 100vh; width: 100vw; overflow-y: auto; padding: 40px; box-sizing: border-box; 
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Floating Minimal Dock */
        #dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px);
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
            display: flex; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); z-index: 1000;
        }

        .dock-item {
            width: 44px; height: 44px; background: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border);
        }

        .dock-item:hover { transform: translateY(-4px); background: #f8f9fa; }

        /* Sleek Tile Content */
        .grid-stack-item-content { 
            background: var(--tile-bg); border-radius: 16px; padding: 20px; 
            box-shadow: var(--shadow); border: 1px solid var(--border);
            display: flex; flex-direction: column; position: relative;
        }

        .delete-btn { 
            position: absolute; top: 12px; right: 12px; border: none; background: none; 
            cursor: pointer; color: #cbd5e0; font-size: 16px; transition: color 0.2s;
        }
        .delete-btn:hover { color: #ff7675; }

        input.title { border: none; outline: none; font-weight: 700; font-size: 1.1rem; color: #2d3436; margin-bottom: 8px; width: 100%; }
        textarea { width: 100%; flex-grow: 1; border: none; outline: none; resize: none; font-family: inherit; font-size: 0.95rem; color: #636e72; line-height: 1.5; }
    </style>
</head>
<body>

<div id="container">
    <div class="grid-stack"></div>
</div>

<div id="dock">
    <div class="dock-item" title="Add Note" onclick="addTile('text')">📝</div>
    <div class="dock-item" title="Embed Link" onclick="addTile('embed')">🔗</div>
    <div class="dock-item" title="Add Image" onclick="addTile('image')">🖼️</div>
    <div style="width: 1px; background: #e2e8f0; margin: 8px 4px;"></div>
    <div class="dock-item" title="Save" onclick="saveBoard()">💾</div>
</div>

<script src="https://jsdelivr.net"></script>
<script>
    const grid = GridStack.init({ float: true, cellHeight: 60, margin: 12, resizable: { handles: 'all' } });

    function addTile(type) {
        let content = '';
        if (type === 'text') {
            content = `<input type="text" placeholder="Note Title" class="title"><textarea placeholder="Your thoughts..."></textarea>`;
        } else if (type === 'embed') {
            const url = prompt("Paste link:");
            if (!url) return;
            const finalUrl = url.replace("watch?v=", "embed/").replace("playlist/", "embed/playlist/");
            content = `<iframe src="${finalUrl}" style="width:100%; height:100%; border:none; border-radius:8px;"></iframe>`;
        }

        const el = `<div><div class="grid-stack-item-content">
                    <button class="delete-btn" onclick="grid.removeWidget(this.parentElement.parentElement)">✕</button>
                    ${content}</div></div>`;
        grid.addWidget(el, {w: 4, h: 4});
    }

    function saveBoard() {
        const data = grid.save(true);
        const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'layout.json';
        a.click();
    }
</script>
</body>
</html>
